name: Step 0 - Welcome

on:
  create:

permissions:
  contents: read
  issues: write

jobs:
  on-start:
    name: Create Lab 1 issue
    runs-on: ubuntu-latest
    # Only run in copies of this template, not in the template itself
    if: >
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
      github.repository != 'luiselopezlopez/GHCopilotWorkshop_PPC2026'
    steps:
      - uses: actions/checkout@v4

      - name: Create workshop label
        run: |
          gh label create "workshop" \
            --description "Sigue el progreso del workshop" \
            --color "0075ca" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Lab 1 issue
        run: |
          REPO="${{ github.repository }}"
          BODY=$(sed "s|{{full_repo_name}}|${REPO}|g" .github/steps/1-lab1.md)
          gh issue create \
            --title "Lab 1 — Ejercicios 1–4: Ask, Plan y Agent" \
            --body "$BODY" \
            --label "workshop"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
