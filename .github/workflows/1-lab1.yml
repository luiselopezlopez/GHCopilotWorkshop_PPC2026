name: Step 1 - Validate Ejercicio 4

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-ejercicio4:
    name: Run Ejercicio 4 tests
    runs-on: ubuntu-latest
    # Run on ejercicio-4/* branches, but not on merge events (handled by unlock-ejercicios-5-8)
    if: startsWith(github.head_ref, 'ejercicio-4/') && github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Compile backend
        run: python -m compileall backend

      - name: Run tests
        id: tests
        run: pytest backend/tests/ -v

      - name: Comment on success
        if: success()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## ✅ Ejercicio 4 completado

            Todos los tests pasan. Fusiona este PR para desbloquear los **ejercicios 5–8**.

            ```
            pytest backend/tests/ ✅
            ```

            Una vez mergeado, recarga la página principal del repositorio para ver las instrucciones de los ejercicios 5–8.

      - name: Comment on failure
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## ❌ Ejercicio 4 — tests fallando

            Revisa el log de Actions y asegúrate de que:
            - La app arranca sin errores (`uvicorn app.main:app --app-dir backend --reload`)
            - `pytest backend/tests/test_notes_page.py` pasa
            - `pytest backend/tests/test_health.py` pasa

            **Pista**: el bug está en `backend/app/services/note_service.py`.

  unlock-ejercicios-5-8:
    name: Unlock Ejercicios 5–8
    runs-on: ubuntu-latest
    # Only run when a ejercicio-4/* PR is merged
    if: startsWith(github.head_ref, 'ejercicio-4/') && github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update README to ejercicios 5–8 instructions
        run: cp .github/steps/2-lab2.md README.md

      - name: Commit ejercicios 5–8 README
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: ejercicio 4 complete — ejercicios 5–8 instructions ready"
          default_author: github_actions
