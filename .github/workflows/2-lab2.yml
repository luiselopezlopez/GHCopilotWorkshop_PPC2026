name: Step 2 - Validate Ejercicio 8

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate-ejercicio8:
    name: Check Ejercicio 8 customizations
    runs-on: ubuntu-latest
    # Run on ejercicio-8/* branches, but not on merge events (handled by finish-workshop)
    if: startsWith(github.head_ref, 'ejercicio-8/') && github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4

      - name: Verify all customization files exist and are non-empty
        run: |
          missing=0
          files=(
            ".github/copilot-instructions.md"
            ".github/instructions/fastapi.instructions.md"
            ".github/prompts/add-sqlite-persistence.prompt.md"
            ".github/skills/notes-sqlite-persistence/SKILL.md"
            ".github/agents/notes-feature-finisher.agent.md"
          )
          for f in "${files[@]}"; do
            if [ ! -s "$f" ]; then
              echo "❌ Falta o está vacío: $f"
              missing=1
            else
              echo "✅ $f"
            fi
          done
          exit $missing

      - name: Comment on success
        if: success()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## ✅ Ejercicio 8 completado

            Todos los archivos de customización están en su lugar en `.github/`.

            Fusiona este PR para **completar el workshop** 🎉

      - name: Comment on failure
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## ❌ Ejercicio 8 — faltan archivos de customización

            Asegúrate de haber copiado los cinco archivos desde `resources/` a `.github/`:

            ```bash
            mkdir -p .github/instructions .github/prompts .github/skills/notes-sqlite-persistence .github/agents
            cp resources/copilot-instructions.md .github/copilot-instructions.md
            cp resources/instructions/fastapi.instructions.md .github/instructions/fastapi.instructions.md
            cp resources/prompts/add-sqlite-persistence.prompt.md .github/prompts/add-sqlite-persistence.prompt.md
            cp resources/skills/notes-sqlite-persistence/SKILL.md .github/skills/notes-sqlite-persistence/SKILL.md
            cp resources/agents/notes-feature-finisher.agent.md .github/agents/notes-feature-finisher.agent.md
            ```

            Confirma que los archivos están incluidos en tu PR antes de volver a validar.

  finish-workshop:
    name: Mark workshop complete
    runs-on: ubuntu-latest
    # Only run when a ejercicio-8/* PR is merged
    if: startsWith(github.head_ref, 'ejercicio-8/') && github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4

      - name: Close Lab 2 issue
        run: |
          ISSUE_NUMBER=$(gh issue list --label workshop --state open --json number --jq '.[0].number')
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue close "$ISSUE_NUMBER" \
              --comment "✅ Lab 2 completado — ¡workshop finalizado!"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create completion issue
        run: |
          gh issue create \
            --title "🎉 ¡Workshop completado!" \
            --body "$(cat .github/steps/X-finish.md)" \
            --label "workshop"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

